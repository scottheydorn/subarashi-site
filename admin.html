<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Admin - Subarashi LLC</title>
    <link rel="stylesheet" href="styles/styles.css">
    <style>
        /* Admin-specific styles */
        #login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }

        .login-box {
            background-color: #161b22;
            border: 1px solid #21262d;
            border-radius: 8px;
            padding: 40px;
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        .login-box h2 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .login-box p {
            color: #8b949e;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .login-box input[type="password"] {
            margin-bottom: 16px;
            text-align: center;
        }

        .login-error {
            color: #f85149;
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }

        #dashboard {
            display: none;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background-color: #161b22;
            border: 1px solid #21262d;
            border-radius: 8px;
            padding: 28px;
            text-align: center;
        }

        .stat-value {
            font-size: 36px;
            color: #1B9D6B;
            display: block;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 12px;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .dashboard-section {
            background-color: #161b22;
            border: 1px solid #21262d;
            border-radius: 8px;
            padding: 28px;
            margin-bottom: 24px;
        }

        .dashboard-section h3 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #1B9D6B;
            margin: 0 0 20px;
        }

        /* Bar chart */
        .chart {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 120px;
            padding-top: 8px;
        }

        .chart-bar-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
            justify-content: flex-end;
        }

        .chart-bar {
            width: 100%;
            background-color: #1B9D6B;
            border-radius: 2px 2px 0 0;
            min-height: 2px;
            transition: background-color 0.2s;
            cursor: default;
            position: relative;
        }

        .chart-bar:hover {
            background-color: #22b87d;
        }

        .chart-labels {
            display: flex;
            gap: 2px;
            margin-top: 6px;
        }

        .chart-label {
            flex: 1;
            text-align: center;
            font-size: 9px;
            color: #6e7681;
        }

        /* Data tables */
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th {
            text-align: left;
            padding: 10px 12px;
            font-size: 11px;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #21262d;
            font-weight: 400;
        }

        .data-table td {
            padding: 10px 12px;
            font-size: 14px;
            color: #e6edf3;
            border-bottom: 1px solid rgba(33, 38, 45, 0.5);
        }

        .data-table td:last-child {
            text-align: right;
            color: #8b949e;
        }

        .data-table tr:last-child td {
            border-bottom: none;
        }

        .bar-inline {
            display: inline-block;
            height: 8px;
            background-color: #1B9D6B;
            border-radius: 4px;
            margin-right: 8px;
            vertical-align: middle;
        }

        .dashboard-actions {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
        }

        .loading-msg {
            color: #8b949e;
            font-size: 14px;
            text-align: center;
            padding: 40px 0;
        }

        .error-msg {
            color: #f85149;
            font-size: 14px;
            text-align: center;
            padding: 20px 0;
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav class="site-nav">
        <div class="nav-inner">
            <a href="index.html" class="nav-logo">subarash&#299;</a>
        </div>
    </nav>

    <div class="container">
        <!-- Login Screen -->
        <div id="login-screen">
            <div class="login-box">
                <h2>Admin</h2>
                <p>Enter your password to view analytics.</p>
                <div class="form-group">
                    <input type="password" id="admin-password" placeholder="Password" autocomplete="off">
                </div>
                <button class="btn btn-primary" onclick="authenticate()" style="width:100%;">Sign In</button>
                <div class="login-error" id="login-error">Incorrect password.</div>
            </div>
        </div>

        <!-- Dashboard (hidden until authenticated) -->
        <div id="dashboard">
            <div class="page-header">
                <span class="section-label">Admin</span>
                <h1>Site Analytics</h1>
            </div>

            <div class="dashboard-actions">
                <button class="btn btn-outline" onclick="loadDashboard()">Refresh</button>
                <button class="btn btn-outline" onclick="logout()">Sign Out</button>
            </div>

            <div id="dashboard-content">
                <div class="loading-msg">Loading analytics...</div>
            </div>
        </div>

        <footer class="site-footer" id="footer" style="display:none;">
            <p>&copy; 2026 Subarashi LLC. All rights reserved.</p>
        </footer>
    </div>

    <script>
        // ===== Configuration =====
        // Replace subarashillc with your GoatCounter site code (e.g. "subarashi")
        // Replace uhgfzsoi2bq6vrpbtsru8yk11wryocleyg4ch21wwcn3u8s56s with your GoatCounter API token
        const GC_SITE = 'subarashillc';
        const GC_TOKEN = 'uhgfzsoi2bq6vrpbtsru8yk11wryocleyg4ch21wwcn3u8s56s';
        const PASSWORD_HASH = 'e074bd8a8079548a485eeaf926a6ccac82ee453a590ccb9cb26769c70687b89c';

        // ===== Auth =====
        async function sha256(str) {
            const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
            return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function authenticate() {
            const pw = document.getElementById('admin-password').value;
            const hash = await sha256(pw);
            if (hash === PASSWORD_HASH) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('footer').style.display = 'block';
                document.getElementById('login-error').style.display = 'none';
                loadDashboard();
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }

        function logout() {
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('footer').style.display = 'none';
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('admin-password').value = '';
        }

        document.getElementById('admin-password').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') authenticate();
        });

        // ===== GoatCounter API =====
        async function gcFetch(endpoint) {
            const url = `https://${GC_SITE}.goatcounter.com/api/v0${endpoint}`;
            const resp = await fetch(url, {
                headers: { 'Authorization': 'Bearer ' + GC_TOKEN }
            });
            if (!resp.ok) throw new Error(`API returned ${resp.status}`);
            return resp.json();
        }

        function formatDate(d) {
            return d.toISOString().split('T')[0];
        }

        // ===== Dashboard =====
        async function loadDashboard() {
            const content = document.getElementById('dashboard-content');
            content.innerHTML = '<div class="loading-msg">Loading analytics...</div>';

            try {
                const today = new Date();
                const sevenAgo = new Date(today); sevenAgo.setDate(sevenAgo.getDate() - 7);
                const thirtyAgo = new Date(today); thirtyAgo.setDate(thirtyAgo.getDate() - 30);

                // Fetch stats sequentially to avoid 429 rate limit (4 req/s)
                const totalToday = await gcFetch(`/stats/total?start=${formatDate(today)}&end=${formatDate(today)}`);
                const total7d = await gcFetch(`/stats/total?start=${formatDate(sevenAgo)}&end=${formatDate(today)}`);
                const total30d = await gcFetch(`/stats/total?start=${formatDate(thirtyAgo)}&end=${formatDate(today)}`);
                const pages30d = await gcFetch(`/stats/hits?start=${formatDate(thirtyAgo)}&end=${formatDate(today)}&limit=10&daily=true`);

                const todayCount = totalToday.total || totalToday.total_display || 0;
                const weekCount = total7d.total || total7d.total_display || 0;
                const monthCount = total30d.total || total30d.total_display || 0;

                let html = '';

                // Summary cards
                html += `
                    <div class="stats-grid">
                        <div class="stat-card">
                            <span class="stat-value">${todayCount}</span>
                            <span class="stat-label">Today</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-value">${weekCount}</span>
                            <span class="stat-label">Last 7 Days</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-value">${monthCount}</span>
                            <span class="stat-label">Last 30 Days</span>
                        </div>
                    </div>
                `;

                // Daily chart (last 30 days)
                if (pages30d.hits && pages30d.hits.length > 0) {
                    // Aggregate daily totals across all pages
                    const dailyTotals = {};
                    for (const page of pages30d.hits) {
                        if (!page.stats) continue;
                        for (const dayStat of page.stats) {
                            const day = dayStat.day;
                            dailyTotals[day] = (dailyTotals[day] || 0) + dayStat.daily;
                        }
                    }

                    const days = Object.keys(dailyTotals).sort();
                    const values = days.map(d => dailyTotals[d]);
                    const maxVal = Math.max(...values, 1);

                    html += '<div class="dashboard-section"><h3>Daily Views (30 Days)</h3><div class="chart">';
                    for (let i = 0; i < days.length; i++) {
                        const pct = (values[i] / maxVal) * 100;
                        html += `<div class="chart-bar-wrapper"><div class="chart-bar" style="height:${pct}%" title="${days[i]}: ${values[i]} views"></div></div>`;
                    }
                    html += '</div><div class="chart-labels">';
                    for (let i = 0; i < days.length; i++) {
                        const label = (i === 0 || i === days.length - 1 || i % 7 === 0) ? days[i].slice(5) : '';
                        html += `<div class="chart-label">${label}</div>`;
                    }
                    html += '</div></div>';

                    // Top pages table
                    const pageStats = pages30d.hits.map(p => ({
                        path: p.path,
                        count: p.count
                    })).sort((a, b) => b.count - a.count);

                    const totalViews = pageStats.reduce((s, p) => s + p.count, 0);

                    html += '<div class="dashboard-section"><h3>Top Pages</h3><table class="data-table"><thead><tr><th>Page</th><th style="text-align:right">Views</th></tr></thead><tbody>';
                    for (const page of pageStats) {
                        const pct = totalViews > 0 ? ((page.count / totalViews) * 100).toFixed(1) : 0;
                        const barWidth = totalViews > 0 ? Math.max(4, (page.count / totalViews) * 200) : 4;
                        html += `<tr><td><span class="bar-inline" style="width:${barWidth}px"></span>${escapeHtml(page.path)}</td><td style="text-align:right">${page.count} (${pct}%)</td></tr>`;
                    }
                    html += '</tbody></table></div>';
                }

                content.innerHTML = html;

            } catch (err) {
                console.error('Dashboard load failed:', err);
                content.innerHTML = `<div class="error-msg">Failed to load analytics: ${escapeHtml(err.message)}<br><br>Make sure your GoatCounter site code and API token are configured in admin.html.</div>`;
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
    </script>
</body>
</html>
