    <meta charset="UTF-8">

    <title>Contact - Subarashi LLC</title>
    <link rel="stylesheet" href="styles/styles.css">
    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            // Replace with your EmailJS public key
            emailjs.init("7BVXVJEOpVIyj9cXu");
        })();
    </script>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-container">
                <a href="index.html">
                    <img src="images/subarashi-logo.png" alt="Subarashi LLC Logo" class="logo">
                </a>
            </div>
        </header>
        
        <nav class="navigation">
            <a href="index.html">Home</a>
            <a href="services.html">Services</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <a href="legal.html">Legal</a>
        </nav>
        
        <main class="content">
            <h1>Contact Us</h1>
            
            <div class="contact-info">
                <p>We're here to answer your questions and discuss how Subarashi LLC can help your business succeed. Send an email or complete the form below to get in touch:</p>
                
                <p><strong>Email:</strong> info@subarashillc.com</p>
            </div>
            
            <div class="contact-form">
    <h2>Send Us a Message</h2>
    <form id="contactForm" onsubmit="sendEmail(event)">
        <div class="form-group">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
        </div>
        
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
        </div>
        
        <div class="form-group">
            <label for="phone">Phone:</label>
            <input type="tel" id="phone" name="phone">
        </div>
        
        <div class="form-group">
            <label for="subject">Subject:</label>
            <select id="subject" name="subject">
                <option value="general">General Inquiry</option>
                <option value="services">Services Information</option>
                <option value="consultation">Request a Consultation</option>
                <option value="other">Other</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="message">Message:</label>
            <textarea id="message" name="message" required></textarea>
        </div>
        
        <button type="submit" id="submitButton">Send Message</button>
    </form>
    <div id="formStatus"></div>
</div>

<script>
function sendEmail(event) {
    event.preventDefault();
    
    // Get form values
    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const phone = document.getElementById('phone').value;
    const subjectSelect = document.getElementById('subject');
    const subjectValue = subjectSelect.value;
    const subjectText = subjectSelect.options[subjectSelect.selectedIndex].text;
    const message = document.getElementById('message').value;
    
    // Format subject line based on form selection
    let subjectLine = "";
    switch(subjectValue) {
        case "general":
            subjectLine = "General Inquiry from Website";
            break;
        case "services":
            subjectLine = "Services Information Request";
            break;
        case "consultation":
            subjectLine = "Consultation Request";
            break;
        case "other":
            subjectLine = "Website Inquiry";
            break;
        default:
            subjectLine = "Website Contact Form Submission";
    }
    
    // Disable submit button and show sending message
    document.getElementById('submitButton').disabled = true;
    const formStatus = document.getElementById('formStatus');
    formStatus.innerHTML = "Sending your message...";
    
    // Prepare template parameters
    const templateParams = {
        from_name: name,
        from_email: email,
        phone: phone || "Not provided",
        subject: subjectLine,
        subject_category: subjectText,
        message: message,
        to_email: "info@subarashillc.com"
    };
    
    // Send the email using EmailJS
    // Replace with your service ID and template ID
    emailjs.send('service_qva602m', 'template_44aof6g', templateParams)
        .then(function(response) {
            formStatus.innerHTML = "Your message has been sent successfully!";
            document.getElementById('contactForm').reset();
            document.getElementById('submitButton').disabled = false;
        }, function(error) {
            formStatus.innerHTML = "There was an error sending your message. Please try again.";
            document.getElementById('submitButton').disabled = false;
            console.error('EmailJS error:', error);
        });
    
    return false;
}
</script>
        </main>

            <p>&copy; 2025 Subarashi LLC. All rights reserved.</p>
        </footer>
    </div>
